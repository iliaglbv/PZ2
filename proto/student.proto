syntax = "proto3";

package student;

option go_package = "gen/studentpb;studentpb";

message PingRequest {
    string message = 1;
}

message PingResponse {
    string message = 1;
}

message GetStudentRequest {
    int64 id = 1;
}

message Student {
    int64 id = 1;
    string full_name = 2;
    string group = 3;
    string email = 4;
}

message GetStudentResponse {
    Student student = 1;
}

service StudentService {
    rpc Ping(PingRequest) returns (PingResponse);
    rpc GetStudentByID(GetStudentRequest) returns (GetStudentResponse);
}

